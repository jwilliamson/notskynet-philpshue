# rooms_scenes.yaml
# Configuration for Philips Hue scene synchronization
#
# See ROOMS_SCENES_GUIDE.md for detailed documentation

rooms:
  - room_name: "Office Lights"
    scenes:
      - "Rest"
      - "Nightlight"
      - "Dimmed"
      - "Relax"
      - "Read"

    # Switch configuration with per-button assignments
    switches:
      - device_name: "Office Light Switch"
        model_type: "v1"
        buttons:
          - button_number: 1
            action: "timezone"
            target: "Office Lights"
            time_slots:
              - start_time:
                  hour: 8
                scene: "Relax"
              - start_time:
                  hour: 13
                scene: "Read"
              - start_time:
                  hour: 18
                scene: "Rest"
              - start_time:
                  hour: 20
                scene: "Nightlight"
          - button_number: 2
            action: "dim_up"
          - button_number: 3
            action: "dim_down"
          - button_number: 4
            action: "room_toggle"
            target: "Office Lights"

  - room_name: "Hallway Lights"
    scenes:
      - "Rest"
      - "Nightlight"
      - "Dimmed"
      - "Relax"
      - "Read"

    switches:
      - device_name: "Hallway Light Switch"
        model_type: "dimmer_v2"
        buttons:
          - button_number: 1
            action: "timezone"
            target: "Hallway Lights"
            time_slots:
              - start_time:
                  hour: 8
                scene: "Relax"
              - start_time:
                  hour: 13
                scene: "Read"
              - start_time:
                  hour: 18
                scene: "Rest"
              - start_time:
                  hour: 20
                scene: "Nightlight"

          - button_number: 2
            action: "dim_up"

          - button_number: 3
            action: "dim_down"

          - button_number: 4
            action: "scene_cycle"

  - room_name: "Landing Lights"
    scenes:
      - "Rest"
      - "Nightlight"
      - "Dimmed"
      - "Relax"
      - "Read"

    switches:
      - device_name: "Landing Light Switch"
        model_type: "dimmer_v2"
        buttons:
          - button_number: 1
            action: "timezone"
            target: "Landing Lights"
            time_slots:
              - start_time:
                  hour: 8
                scene: "Relax"
              - start_time:
                  hour: 13
                scene: "Read"
              - start_time:
                  hour: 18
                scene: "Rest"
              - start_time:
                  hour: 20
                scene: "Nightlight"

          - button_number: 2
            action: "dim_up"

          - button_number: 3
            action: "dim_down"

          - button_number: 4
            action: "scene_cycle"
