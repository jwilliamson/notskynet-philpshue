# rooms_scenes.yaml
# Configuration for Philips Hue scene synchronization
#
# See ROOMS_SCENES_GUIDE.md for detailed documentation

rooms:
  - room_name: "Office Lights"
    scenes:
      # Rest scene - 35% brightness, warm orange
      - name: "Rest"
        brightness: 35.0
        color:
          x: 0.5609999
          y: 0.4042

      # Nightlight scene - 10% brightness, warm orange
      - name: "Nightlight"
        brightness: 10.0
        color:
          x: 0.5609999
          y: 0.4042

      # Dimmed scene - 30% brightness, warm white
      - name: "Dimmed"
        brightness: 30.0
        color_temperature:
          mirek: 370

      # Relax scene - 56% brightness, very warm white
      - name: "Relax"
        brightness: 56.25
        color_temperature:
          mirek: 447

      # Read scene - 100% brightness, slightly cool white
      - name: "Read"
        brightness: 100.0
        color_temperature:
          mirek: 346

    # Switch configuration with per-button assignments
    switches:
      - device_name: "Office Light Switch"
        model_type: "v1"
        buttons:
          - button_number: 1
            action: "timezone"
            target: "Office Lights"
            time_slots:
              - start_time:
                  hour: 8
                scene: "Relax"
              - start_time:
                  hour: 13
                scene: "Read"
              - start_time:
                  hour: 18
                scene: "Rest"
              - start_time:
                  hour: 20
                scene: "Nightlight"
          - button_number: 2
            action: "dim_up"
          - button_number: 3
            action: "dim_down"
          - button_number: 4
            action: "room_toggle"
            target: "Office Lights"
